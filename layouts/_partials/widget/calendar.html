<section class="widget calendar-widget">
    <div class="widget-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    </div>
    <h2 class="widget-title section-title">日历</h2>
    <div class="widget-content">
        <div class="cal-nav">
            <button class="cal-btn cal-prev" onclick="changeMonth(-1)">&lsaquo;</button>
            <span class="cal-month-year" id="calTitle"></span>
            <button class="cal-btn cal-next" onclick="changeMonth(1)">&rsaquo;</button>
        </div>
        <table class="cal-table">
            <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
            <tbody id="calBody"></tbody>
        </table>
    </div>
</section>

<section class="widget heatmap-widget">
    <div class="widget-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
    </div>
    <h2 class="widget-title section-title">活跃热力图</h2>
    <div class="widget-content">
        <div class="heatmap-container" id="heatmapContainer">
            <div class="heatmap-loading">加载中...</div>
        </div>
    </div>
</section>

<script>
(function() {
    const today = new Date();
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth();

    const monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

    const dayNames = ["日","一","二","三","四","五","六"];

    function renderCalendar() {
        const title = document.getElementById("calTitle");
        const body = document.getElementById("calBody");
        if (!title || !body) return;

        title.textContent = viewYear + "年" + monthNames[viewMonth];

        const firstDay = new Date(viewYear, viewMonth, 1).getDay();
        const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

        let html = "";
        let row = "<tr>";
        for (let i = 0; i < firstDay; i++) {
            row += "<td></td>";
        }
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(viewYear, viewMonth, d);
            const isToday = (viewYear === today.getFullYear() && viewMonth === today.getMonth() && d === today.getDate());
            const cls = isToday ? " class=\"cal-today\"" : "";
            row += "<td" + cls + ">" + d + "</td>";
            if ((firstDay + d) % 7 === 0 && d < daysInMonth) {
                row += "</tr><tr>";
            }
        }
        row += "</tr>";
        body.innerHTML = row;

        // Auto-advance: if today is past this month, switch to next
        if (viewYear < today.getFullYear() || (viewYear === today.getFullYear() && viewMonth < today.getMonth())) {
            viewYear = today.getFullYear();
            viewMonth = today.getMonth();
            renderCalendar();
            return;
        }
    }

    window.changeMonth = function(delta) {
        viewMonth += delta;
        if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        renderCalendar();
    };

    renderCalendar();
})();
</script>
