baseURL = 'https://ChenLiang-lab.github.io/'
theme = 'stack'
defaultContentLanguage = 'zh-cn'
title = 'Alan_Chli的博客'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 10
    [menu.main.params]
      icon = 'home'
  [[menu.main]]
    identifier = 'posts'
    name = '归档'
    url = '/post/'
    weight = 20
    [menu.main.params]
      icon = 'archives'
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 30
    [menu.main.params]
      icon = 'tag'

[pagination]
    pagerSize = 5

[permalinks]
    post = '/:slug/'

[params]
  mainSections = ['post']

  [params.footer]
    since = 2026

  [params.sidebar]
    compact = false

  [params.article]
    toc = true
    readingTime = true
    [params.article.list]
      showTags = true

  [params.widgets]
    homepage = [
      { type = 'recent-posts', params = { limit = 5 } }
    ]
    page = [
      { type = 'toc' },
      { type = 'categories', params = { limit = 10 } },
      { type = 'archives', params = { limit = 10 } },
      { type = 'tag-cloud' }
    ]

  [params.colorScheme]
    toggle = true
    default = 'auto'

  [params.imageProcessing]
    [params.imageProcessing.content]
      widths = [800, 1600, 2400]
      enabled = true
    [params.imageProcessing.thumbnail]
      enabled = true

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
